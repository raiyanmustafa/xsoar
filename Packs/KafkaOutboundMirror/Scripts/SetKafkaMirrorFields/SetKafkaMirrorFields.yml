  version: -1
name: SetKafkaMirrorFields
script: ''
type: python
subtype: python3
tags:
- preProcessing
- pre-processing
comment: Pre-processing script that sets the dbotMirror* fields on every new incident so they are mirrored to Kafka via the Kafka Outbound Mirror integration.
args:
- name: instance_name
  description: Name of the Kafka Outbound Mirror integration instance. If omitted, the script auto-discovers the only active KafkaOutboundMirror instance.
  required: false
- name: tag
  description: War-room entry tag for outbound mirroring.
  required: false
  defaultValue: xsoar-kafka
dockerimage: demisto/python3:3.10.13.74666
fromversion: 6.1.0
tests:
