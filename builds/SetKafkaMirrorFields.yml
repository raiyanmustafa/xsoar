commonfields:
  id: SetKafkaMirrorFields
  version: -1
name: SetKafkaMirrorFields
script: >
  register_module_line('SetKafkaMirrorFields', 'start', __line__())

  CONSTANT_PACK_VERSION = '1.0.0'

  demisto.debug('pack id = KafkaOutboundMirror, pack version = 1.0.0')




  KAFKA_BRAND = "KafkaOutboundMirror"



  def find_kafka_instance():
      modules = demisto.getModules() or {}
      for name, mod in modules.items():
          if mod.get("brand") == KAFKA_BRAND and mod.get("state") == "active":
              return name
      return None


  def main():
      args = demisto.args()
      instance_name = args.get("instance_name") or find_kafka_instance()
      tag = args.get("tag") or "xsoar-kafka"

      if not instance_name:
          return_error(
              f"No active {KAFKA_BRAND} integration instance found. "
              "Create one in Settings > Integrations, or pass instance_name explicitly."
          )

      incident = demisto.incidents()[0]
      incident["dbotMirrorDirection"] = "Out"
      incident["dbotMirrorInstance"] = instance_name
      incident["dbotMirrorTags"] = [tag]

      demisto.executeCommand("setIncident", {"dbotMirrorDirection": "Out"})
      demisto.executeCommand("setIncident", {"dbotMirrorInstance": instance_name})
      demisto.executeCommand("setIncident", {"dbotMirrorTags": [tag]})

      demisto.results(incident)


  if __name__ in ("__main__", "__builtin__", "builtins"):
      main()

  register_module_line('SetKafkaMirrorFields', 'end', __line__())
type: python
subtype: python3
tags:
- pre-processing
comment: Pre-processing script that sets the dbotMirror* fields on every new incident so they are mirrored to Kafka via the Kafka Outbound Mirror integration.
args:
- name: instance_name
  description: Name of the Kafka Outbound Mirror integration instance. If omitted, the script auto-discovers the first active KafkaOutboundMirror instance.
  required: false
- name: tag
  description: War-room entry tag for outbound mirroring.
  required: false
  defaultValue: xsoar-kafka
dockerimage: demisto/python3:3.10.13.74666
fromversion: 6.1.0
tests:
- No tests
